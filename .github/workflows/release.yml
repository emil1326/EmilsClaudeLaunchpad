name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore local tools (vpk)
        run: dotnet tool restore

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish app
        run: |
          dotnet publish src/EmilsClaudeLaunchpad/EmilsClaudeLaunchpad.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishingForVelopack=true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish

      - name: Download previous releases (for delta packages)
        continue-on-error: true
        run: |
          dotnet vpk download github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token ${{ secrets.GITHUB_TOKEN }}

      - name: vpk pack
        run: |
          dotnet vpk pack `
            --packId EmilsClaudeLaunchpad `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir publish `
            --mainExe EmilsClaudeLaunchpad.exe `
            --packTitle "Emil's Claude Launchpad"

      - name: Upload release to GitHub
        run: |
          dotnet vpk upload github `
            --repoUrl https://github.com/${{ github.repository }} `
            --publish `
            --releaseName "${{ github.ref_name }}" `
            --tag ${{ github.ref_name }} `
            --token ${{ secrets.GITHUB_TOKEN }}
